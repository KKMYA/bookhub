spring:
  application:
    name: bookhub
  profiles:
    active: dev # Active le profil dev automatiquement
  jpa:
    hibernate:
      ddl-auto: update # Commun pour le dev en équipe

  springdoc:
    api-docs:
      enabled: true
    swagger-ui:
      enabled: true
      path: /bookhub/api

  server:
    port: 9000














