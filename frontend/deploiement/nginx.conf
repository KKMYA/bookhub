server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Cette ligne est CRUCIALE pour Angular
        # Elle dit à Nginx : "si tu ne trouves pas le fichier, renvoie index.html"
        # C'est ce qui permet au routing Angular de fonctionner
        try_files $uri $uri/ /index.html;
    }

    # Optimisation : Cache pour les fichiers statiques (JS, CSS, images)
    location ~* \.(?:ico|css|js|gif|jpe?g|png)$ {
        expires 1y;
        add_header Cache-Control "public";
    }
}
