<div class="m-8 p-6 bg-white shadow-md rounded-lg">
  <form [formGroup]="searchForm" (ngSubmit)="onSearch()" class="flex flex-col gap-4">

    <div class="flex gap-2">
      <div class="relative flex-1">
        <input
          type="text"
          formControlName="query"
          placeholder="Rechercher par titre, auteur ou ISBN..."
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none"
        />
      </div>

      <button type="submit" class="bg-orange-400 text-white px-6 py-2 rounded-md hover:bg-orange-500 transition font-medium">
        Rechercher
      </button>
      <button
          type="button"
          (click)="resetFilters()"
          class="text-xs font-bold text-blue-600 hover:underline uppercase px-2 rounded-md border border-gray-200"
        >
          Réinitialiser
        </button>
      <button
        type="button"
        (click)="toggle()"
        class="px-4 py-2 text-sm text-gray-500 hover:bg-gray-100 rounded-md border border-gray-200 transition"
      >
        {{ isExpanded ? 'Moins' : 'Plus' }}
      </button>
    </div>

    <div
      class="overflow-hidden transition-all duration-300"
      [style.max-height]="isExpanded ? '150px' : '0px'"
      [style.opacity]="isExpanded ? '1' : '0'"
    >
<div class="pt-6 mt-4 border-t border-gray-100 flex items-center gap-6">
  <label class="group flex items-center gap-3 cursor-pointer select-none">
    <div class="relative flex items-center">
      <input
        type="checkbox"
        formControlName="isAvailable"
        class="peer w-5 h-5 border-2 border-gray-300 rounded text-orange-500 focus:ring-orange-200 transition-all cursor-pointer appearance-none checked:bg-orange-500 checked:border-orange-500"
      >
      <svg class="absolute w-5 h-5 p-0.5 pointer-events-none hidden peer-checked:block text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
      </svg>
    </div>
    <span class="text-sm font-medium text-gray-600 group-hover:text-gray-900 transition-colors">
      Uniquement disponibles
    </span>
  </label>

  <div class="flex items-center gap-3">

    <div class="relative min-w-[220px]">
      <select
        formControlName="category"
        class="w-full pl-4 pr-10 py-2.5 border-2 border-gray-100 rounded-xl bg-gray-50 text-sm font-medium text-gray-700 outline-none appearance-none focus:border-orange-400 focus:bg-white focus:ring-4 focus:ring-orange-50/50 transition-all cursor-pointer"
      >
        <option value="">Toutes les catégories</option>
        <option *ngFor="let cat of categories()" [value]="cat.libelle">
          {{ cat.libelle }}
        </option>
      </select>

      <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </div>
    </div>
  </div>

      </div>
    </div>

  </form>
</div>
