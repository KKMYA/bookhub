<button
	class="inline-flex items-center justify-center rounded-lg bg-[#EFA159] px-4 py-2 font-medium text-white transition hover:cursor-pointer hover:opacity-90 disabled:cursor-not-allowed disabled:opacity-30"
	type="button"
	(click)="openModal()"
>
	{{ triggerLabel }}
</button>

@if (open) {
	<div
		class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/60 px-4 py-6 backdrop-blur-sm"
		(click)="onBackdropClick($event)"
	>
		<section class="w-full max-w-lg overflow-hidden rounded-3xl bg-white shadow-2xl ring-1 ring-black/5">
			<header class="flex items-start justify-between gap-4 border-b border-slate-200 px-6 py-5">
				<div>
					<p class="text-lg font-semibold text-slate-900">{{ title }}</p>
				</div>

				<button
					class="inline-flex h-10 w-10 items-center justify-center rounded-full text-slate-500 transition hover:bg-slate-100 hover:text-slate-900 hover:cursor-pointer"
					type="button"
					aria-label="Fermer la modale"
					(click)="closeModal()"
				>
					<lucide-icon [img]="XIcon" [size]="18"></lucide-icon>
				</button>
			</header>

			<div class="px-6 py-5 text-sm leading-6 text-slate-700">
				<ng-content></ng-content>
			</div>

			<footer class="flex flex-col-reverse gap-3 border-t border-slate-200 bg-slate-50 px-6 py-4 sm:flex-row sm:justify-end">
				@if (showCancelButton) {
					<button
						class="inline-flex items-center justify-center rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100 hover:cursor-pointer"
						type="button"
						(click)="closeModal()"
					>
						{{ cancelLabel }}
					</button>
				}

				@if (showConfirmButton) {
					<button
						class="inline-flex items-center justify-center rounded-lg bg-[#EFA159] px-4 py-2 text-sm font-medium text-white transition hover:cursor-pointer hover:opacity-90 disabled:cursor-not-allowed disabled:opacity-30"
						type="button"
						[disabled]="confirmDisabled"
						(click)="onConfirm()"
					>
						{{ confirmLabel }}
					</button>
				}
			</footer>
		</section>
	</div>
}
