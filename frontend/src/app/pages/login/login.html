<div class="flex flex-col items-center justify-center gap-8">
    <h1 class="font-bold text-2xl mt-4">Connexion</h1>

    <form class="flex flex-col items-center justify-center gap-4 w-full p-4 md:w-1/2 lg:w-1/3" (submit)="$event.preventDefault(); onLogin()">

        <div class="flex flex-col justify-center w-full">
            <label for="email">Email</label>
            <app-input id="email" type="email" autocomplete="email" placeholder="Adresse email" (valueChange)="email = $event"></app-input>

        </div>


        <div class="flex flex-col justify-center w-full">
            <label for="password">Mot de passe</label>
            <app-input-password id="password" autocomplete="current-password"
                placeholder="Mot de passe" (valueChange)="password = $event"></app-input-password>

        </div>

        <div class="flex flex-col justify-between w-full">
            <app-button type="submit" class="w-full">

                Se connecter

            </app-button>

            <p class="text-sm mt-2 text-center">
                Vous n’avez pas de compte ?
                <a href="/register" class="text-[#EFA159] hover:underline">S'inscrire</a>
            </p>
        </div>


    </form>
</div>
