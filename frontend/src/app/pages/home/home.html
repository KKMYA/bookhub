<div class="flex flex-row flex-wrap items-center justify-center gap-8 p-8">
    @for (book of books; track book.id) {
    <a href="/book/{{ book.id }}"
        class="flex flex-col items-center justify-center bg-gray-300 p-4 rounded-xl w-104 gap-4">

        <div class="flex flex-row items-center justify-between w-full">
            <div>
                <h1 class="text-2xl font-bold">{{ book.title }}</h1>
                <p class="text-gray-600">{{ book.author }}</p>
            </div>

            <div class="flex flex-row items-center justify-center gap-2">
                <p>{{ book.rating }}</p>

                <lucide-angular [img]="Star" class="text-yellow-400 fill-yellow-400"></lucide-angular>
            </div>
        </div>

        <img [src]="book.imageUrl" alt="{{ book.title }}" class="w-64 h-auto" />

        <app-button class="w-full" [disabled]="!loggedIn || !book.available">
            @if (book.available) {
                Réserver
            } @else {
                Indisponible
            }
        </app-button>
    </a>
    }
</div>
