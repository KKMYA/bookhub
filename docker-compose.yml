services:
  frontend:
    build:
      context: ./frontend  # Dossier qui contient ton projet Angular et son Dockerfile
    ports:
      - "80:80"
    depends_on:
      - app
  # Ton application Spring Boot
  app:
    build: backend
    ports:
      - "9090:9090"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://db:1433;databaseName=bookhub;encrypt=true;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=Agn3s!BookHub2026
    depends_on:
      db:
        condition: service_healthy

  # Ta base de données SQL Server
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Agn3s!BookHub2026
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Agn3s!BookHub2026' -Q 'SELECT 1' -C"]
      interval: 10s
      timeout: 5s
      retries: 5